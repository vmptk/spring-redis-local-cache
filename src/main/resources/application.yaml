spring:
  application:
    name: ${INSTANCE_NAME:demo}
  
  redis:
    host: ${SPRING_DATA_REDIS_HOST:localhost}
    port: ${SPRING_DATA_REDIS_PORT:6379}
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms
  
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=2m,expireAfterAccess=1m,recordStats

server:
  port: ${SERVER_PORT:8080}

# Instance identification for logging
app:
  instance:
    name: ${INSTANCE_NAME:demo}

logging:
  level:
    com.example.demo: INFO
    org.springframework.cache: DEBUG
    org.springframework.data.redis: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [${app.instance.name:demo}] [%thread] %-5level %logger{36} - %msg%n"
