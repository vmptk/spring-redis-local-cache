spring:
  application:
    name: demo
  
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    jedis:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms
  
  cache:
    redis:
      # Maximum entries in Jedis client-side cache
      local-max-size: 1000

logging:
  level:
    com.example.demo: DEBUG
    org.springframework.cache: DEBUG
