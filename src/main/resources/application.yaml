spring:
  application:
    name: demo
  
  redis:
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

cache:
  near:
    local-ttl: PT5M
    redis-ttl: PT10M
    max-local-size: 1000

logging:
  level:
    com.example.demo: DEBUG
    org.springframework.cache: DEBUG
